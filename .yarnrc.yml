nodeLinker: node-modules

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-workspace-tools.cjs
    spec: "@yarnpkg/plugin-workspace-tools"

yarnPath: .yarn/releases/yarn-4.2.2.cjs

# Permitir builds de pacotes nativos
supportedArchitectures:
  os:
    - current
    - linux
    - darwin
    - win32
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl

# Ignorar peer dependencies incorretas (para react-spinners)
packageExtensions:
  "react-spinners@*":
    peerDependencies:
      react: "^18.0.0"
      react-dom: "^18.0.0"
